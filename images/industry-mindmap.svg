  <!-- ── Legend ── -->
  <line x1="40" y1="726" x2="920" y2="726" stroke="rgba(26,46,59,0.12)" stroke-width="0.8"/>
  <rect x="44" y="732" width="12" height="12" rx="2" fill="rgba(30,144,214,0.10)" stroke="#1e90d6" stroke-width="1.2"/>
  <text x="62" y="741" class="eye">HUB</text>
  <rect x="104" y="732" width="12" height="12" rx="2" fill="rgba(30,144,214,0.06)" stroke="#1e90d6" stroke-width="1"/>
